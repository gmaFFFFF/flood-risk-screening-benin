<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <style>
        .axis { stroke: black; stroke-width: 2; }
        .grid { stroke: #e0e0e0; stroke-width: 1; stroke-dasharray: 4 4; }
        .line-large { stroke: #d32f2f; stroke-width: 3; fill: none; }
        .line-small { stroke: #1976d2; stroke-width: 3; fill: none; }
        .line-mslarge { stroke: #388e3c; stroke-width: 3; fill: none; }
        .line-logistic { stroke: #fbc02d; stroke-width: 3; fill: none; }
        .text { font-family: Arial, sans-serif; font-size: 14px; }
        .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
        .legend-text { font-family: Arial, sans-serif; font-size: 14px; }
    </style>
    
    <rect width="100%" height="100%" fill="white"/>
    
    <!-- Title -->
    <text x="400" y="40" text-anchor="middle" class="title">Основные функции принадлежности (Fuzzy Membership)</text>
    
    <!-- Grid -->
    <line x1="100" y1="100" x2="700" y2="100" class="grid" />
    <line x1="100" y1="200" x2="700" y2="200" class="grid" />
    <line x1="100" y1="300" x2="700" y2="300" class="grid" />
    <line x1="100" y1="400" x2="700" y2="400" class="grid" />
    <line x1="100" y1="500" x2="700" y2="500" class="grid" />
    
    <!-- Axes -->
    <line x1="100" y1="500" x2="700" y2="500" class="axis" />
    <line x1="100" y1="500" x2="100" y2="100" class="axis" />
    
    <!-- Y-axis labels -->
    <text x="90" y="505" text-anchor="end" class="text">0.0</text>
    <text x="90" y="305" text-anchor="end" class="text">0.5</text>
    <text x="90" y="105" text-anchor="end" class="text">1.0</text>
    
    <!-- X-axis labels -->
    <text x="100" y="525" text-anchor="middle" class="text">Min</text>
    <text x="400" y="525" text-anchor="middle" class="text">Midpoint</text>
    <text x="700" y="525" text-anchor="middle" class="text">Max</text>
    
    <text x="400" y="560" text-anchor="middle" class="title">Значение фактора (x)</text>
    <text x="40" y="300" text-anchor="middle" transform="rotate(-90, 40, 300)" class="title">Степень принадлежности (μ)</text>
    
    <!-- Curves -->
    <!-- Large: S-curve going from 0 to 1, midpoint at 400 -->
    <path d="M 100 500 C 400 500 400 100 700 100" class="line-large" />
    
    <!-- Small: Z-curve going from 1 to 0, midpoint at 400 -->
    <path d="M 100 100 C 400 100 400 500 700 500" class="line-small" />
    
    <!-- MSLarge: Bell curve (1 at 400) -->
    <path d="M 100 500 C 300 500 350 100 400 100 C 450 100 500 500 700 500" class="line-mslarge" />
    
    <!-- LogisticDecay: 1 up to 200, then exponential decay -->
    <path d="M 100 100 L 200 100 C 350 100 400 450 700 495" class="line-logistic" />
    
    <!-- Legend -->
    <rect x="560" y="120" width="130" height="130" fill="white" stroke="black" stroke-width="1"/>
    
    <line x1="570" y1="140" x2="590" y2="140" class="line-large" />
    <text x="600" y="145" class="legend-text">Large</text>
    
    <line x1="570" y1="170" x2="590" y2="170" class="line-small" />
    <text x="600" y="175" class="legend-text">Small</text>
    
    <line x1="570" y1="200" x2="590" y2="200" class="line-mslarge" />
    <text x="600" y="205" class="legend-text">MSLarge</text>
    
    <line x1="570" y1="230" x2="590" y2="230" class="line-logistic" />
    <text x="600" y="235" class="legend-text">LogisticDecay</text>
</svg>